<!DOCTYPE html>
<html>
<head>
    <title>Test Backend</title>
</head>
<body>
    <h1>Test de Conexión al Backend</h1>
    
    <button onclick="testLogin()">Probar Login</button>
    <button onclick="testRegister()">Probar Registro</button>
    <button onclick="testBooks()">Probar Libros</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
        async function testLogin() {
            const result = document.getElementById('result');
            result.innerHTML = 'Probando login...';
            
            try {
                const response = await fetch('https://biblionsoftware.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: 'test@test.com', 
                        password: '123456' 
                    })
                });
                
                const text = await response.text();
                result.innerHTML = `
                    <strong>Status:</strong> ${response.status}<br>
                    <strong>Response:</strong> ${text}<br>
                    <strong>Type:</strong> ${typeof text}
                `;
            } catch (error) {
                result.innerHTML = 'Error: ' + error.message;
            }
        }

        async function testRegister() {
            const result = document.getElementById('result');
            result.innerHTML = 'Probando registro...';
            
            try {
                const response = await fetch('https://biblionsoftware.onrender.com/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: 'Test User',
                        email: 'test' + Date.now() + '@test.com', 
                        matricula: '2024-0001',
                        password: '123456' 
                    })
                });
                
                const text = await response.text();
                result.innerHTML = `
                    <strong>Status:</strong> ${response.status}<br>
                    <strong>Response:</strong> ${text}<br>
                    <strong>Type:</strong> ${typeof text}
                `;
            } catch (error) {
                result.innerHTML = 'Error: ' + error.message;
            }
        }

        async function testBooks() {
            const result = document.getElementById('result');
            result.innerHTML = 'Probando libros...';
            
            try {
                const response = await fetch('https://biblionsoftware.onrender.com/api/book');
                const text = await response.text();
                
                let displayText = text;
                try {
                    const json = JSON.parse(text);
                    displayText = JSON.stringify(json, null, 2);
                } catch {}
                
                result.innerHTML = `
                    <strong>Status:</strong> ${response.status}<br>
                    <strong>Response:</strong> <pre>${displayText}</pre>
                `;
            } catch (error) {
                result.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
