<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Biblion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="nav-logo">Biblion</a>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Inicio</a></li>
                    <li><a href="login.html" class="nav-link active">Iniciar Sesión</a></li>
                    <li><a href="register.html" class="nav-link">Registrarse</a></li>
                    <li><a href="invitado.html" class="nav-link guest-btn">Entrar como Invitado</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h2>Iniciar Sesión</h2>
                <p class="auth-subtitle">Accede a tu biblioteca personal</p>
                
                <!-- ⚠️ IMPORTANTE: El ID debe ser "login-form" no "formulario de inicio de sesión" -->
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="endpoints/Login-endpoint.js"></script>
</body>
</html>
